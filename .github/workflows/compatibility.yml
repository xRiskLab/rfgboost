name: Python Version Compatibility

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # schedule:
  #   # Run weekly on Sundays (disabled to save GitHub Actions minutes)
  #   - cron: '0 0 * * 0'

jobs:
  compatibility-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "latest"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ matrix.python-version }}-
          ${{ runner.os }}-uv-

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies
      run: uv sync --dev

    - name: Verify installation
      run: |
        uv run python -c "import rfgboost; print('rfgboost imported successfully')"

    - name: Run test suite
      run: uv run python -m pytest tests/ -v --tb=short

    - name: Cleanup test artifacts
      if: always()
      shell: bash
      run: |
        rm -rf .pytest_cache/
        rm -rf .venv/
        rm -rf __pycache__/
        find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
