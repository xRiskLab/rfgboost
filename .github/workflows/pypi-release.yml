name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read

# Build a single abi3 (stable-ABI) wheel per platform. Forward-compatibility
# lets pyo3 0.22 build on runners whose Python is newer than its max (3.13),
# e.g. the 3.14 images. The PYO3_ prefix is forwarded into the manylinux
# container by maturin-action.
env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run python -m pytest tests/ -v

  linux:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    needs: test
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  pyodide:
    name: Build Pyodide (WASM) wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pyodide-build
        run: pip install "pyodide-build==0.35.1"

      # Pyodide 0.28 cross-build env (CPython 3.13 / emscripten 4.0.9) — matches
      # current JupyterLite. pyemscripten_2025_0 covers Pyodide 0.26.0 and later.
      - name: Install cross-build environment
        run: pyodide xbuildenv install 0.28.0

      - name: Resolve emscripten + rust toolchain
        id: ver
        run: |
          echo "emscripten=$(pyodide config get emscripten_version)" >> "$GITHUB_OUTPUT"
          echo "rust=$(pyodide config get rust_toolchain)" >> "$GITHUB_OUTPUT"

      - name: Set up emscripten ${{ steps.ver.outputs.emscripten }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.ver.outputs.emscripten }}

      - name: Set up Rust ${{ steps.ver.outputs.rust }}
        run: |
          rustup toolchain install "${{ steps.ver.outputs.rust }}" --profile minimal
          rustup target add wasm32-unknown-emscripten --toolchain "${{ steps.ver.outputs.rust }}"
          rustup component add rust-src --toolchain "${{ steps.ver.outputs.rust }}"
          rustup override set "${{ steps.ver.outputs.rust }}"

      # build-std + hidden visibility: emscripten 4.0.9 rejects Rust std's
      # mangled symbols in the side-module export table; recompiling std hidden
      # avoids it.
      - name: Build wasm wheel
        run: |
          export RUSTFLAGS="$(pyodide config get rustflags) -Zdefault-visibility=hidden"
          export CARGO_UNSTABLE_BUILD_STD="std,panic_abort"
          pyodide build

      # pyodide-build 0.35.1 tags the wheel `pyemscripten_2025_0_wasm32`, but
      # Pyodide/JupyterLite (0.28.x) and micropip only recognize the canonical
      # `pyodide_2025_0_wasm32` ABI tag. The mistagged wheel makes
      # `micropip.install("rfgboost")` fail with "Can't find a pure Python 3
      # wheel" (and direct/emfs installs fail the emscripten-version check).
      # Normalize the platform tag so the published wheel actually resolves.
      - name: Normalize Pyodide platform tag
        run: |
          pip install wheel
          python -m wheel tags --remove --platform-tag pyodide_2025_0_wasm32 dist/*.whl
          ls -la dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-pyodide
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist, pyodide]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## Changes

            See [CHANGELOG.md](https://github.com/xRiskLab/rfgboost/blob/main/CHANGELOG.md) for detailed changes.

            ## Installation

            ```bash
            pip install rfgboost==${{ steps.get_version.outputs.version }}
            ```

            ## What's New in v${{ steps.get_version.outputs.version }}

            Check the [CHANGELOG](https://github.com/xRiskLab/rfgboost/blob/main/CHANGELOG.md#version-${{ steps.get_version.outputs.version }}) for full details.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
